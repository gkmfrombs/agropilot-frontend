<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sync Center — Sygenta Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1E8;
    --surface: #FFFFFF;
    --surface-warm: #FAF6EC;
    --ink: #1A1A17;
    --ink-soft: #6B6A5F;
    --primary: #2E4A3A;
    --primary-soft: #C8D5BB;
    --accent: #C9974A;
    --danger: #B85C3C;
    --warning: #D4A347;
    --border: #E5DCC9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #2c3a22; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 620ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  @keyframes ringSpin { to { transform: rotate(360deg); } }
  .ring-spin { animation: ringSpin 1.4s linear infinite; }
  .ring-spin-slow { animation: ringSpin 8s linear infinite; }

  @keyframes checkPop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .check-pop { display: inline-flex; animation: checkPop 440ms cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  @keyframes arrowBounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(3px); }
  }
  .arrow-bounce { display: inline-flex; animation: arrowBounce 1.1s ease-in-out infinite; }

  @keyframes rowCheckPulse {
    0%   { transform: scale(1); opacity: 0.55; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  .row-check { animation: rowCheckPulse 1.1s ease-out infinite; transform-origin: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="sync-center.jsx"></script>
</body>
</html>
