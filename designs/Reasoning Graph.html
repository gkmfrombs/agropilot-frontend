<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reasoning Graph — Sygenta Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1E8;
    --surface: #FFFFFF;
    --surface-warm: #FAF6EC;
    --ink: #1A1A17;
    --ink-soft: #6B6A5F;
    --primary: #2E4A3A;
    --primary-soft: #C8D5BB;
    --accent: #C9974A;
    --danger: #B85C3C;
    --warning: #D4A347;
    --border: #E5DCC9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #2c3a22; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 620ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  /* Edge stroke draw */
  @keyframes edgeDraw {
    from { stroke-dashoffset: 200; opacity: 0; }
    20%  { opacity: 1; }
    to   { stroke-dashoffset: 0; opacity: 1; }
  }
  .edge-draw {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    opacity: 0;
    animation: edgeDraw 900ms cubic-bezier(0.5, 0, 0.2, 1) forwards;
  }

  /* Edge label reveal */
  @keyframes edgeLabelIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  .edge-label {
    opacity: 0;
    transform-origin: center;
    animation: edgeLabelIn 360ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* Traveling pulse along edge */
  @keyframes edgePulse {
    0%   { offset-distance: 0%;   opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.9; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .edge-pulse {
    animation: edgePulse 4s ease-in-out infinite;
  }

  /* Node entry — spring-ish */
  @keyframes nodeIn {
    0%   { opacity: 0; transform: scale(0.78); }
    60%  { opacity: 1; transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .node-in {
    opacity: 0;
    transform-origin: center;
    animation: nodeIn 620ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  /* Center glow */
  @keyframes centerGlow {
    0%, 100% { stroke-opacity: 0.18; r: 48; }
    50%      { stroke-opacity: 0.50; r: 56; }
  }
  .center-glow { animation: centerGlow 3.4s ease-in-out infinite; transform-origin: center; }

  /* Flyout in */
  @keyframes flyoutIn {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .flyout-in { animation: flyoutIn 380ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  @keyframes scrimIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .scrim { animation: scrimIn 280ms ease-out both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="reasoning-graph.jsx"></script>
</body>
</html>
