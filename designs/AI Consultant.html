<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Consultant — Sygenta Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1E8;
    --surface: #FFFFFF;
    --surface-warm: #FAF6EC;
    --ink: #1A1A17;
    --ink-soft: #6B6A5F;
    --primary: #2E4A3A;
    --primary-soft: #C8D5BB;
    --accent: #C9974A;
    --danger: #B85C3C;
    --warning: #D4A347;
    --border: #E5DCC9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #2c3a22; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 620ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  @keyframes slideInL {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .slide-in-l { animation: slideInL 520ms cubic-bezier(0.16, 1, 0.3, 1) both; }

  @keyframes caretBlink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .caret {
    display: inline-block; width: 2px; height: 0.85em;
    background: var(--primary); vertical-align: -2px;
    margin-left: 2px; animation: caretBlink 0.9s steps(1, start) infinite;
  }

  @keyframes fabBreatheMic {
    0%, 100% { transform: scale(1); box-shadow: 0 6px 14px rgba(46,74,58,0.30), inset 0 1px 0 rgba(255,255,255,0.18); }
    50%      { transform: scale(1.04); box-shadow: 0 10px 22px rgba(46,74,58,0.36), inset 0 1px 0 rgba(255,255,255,0.18); }
  }
  .fab-breathe-mic { animation: fabBreatheMic 2.6s ease-in-out infinite; transform-origin: center; }

  @keyframes fabPulse {
    0%, 100% { transform: scale(1.06); box-shadow: 0 0 0 0 rgba(184,92,60,0.5), 0 6px 14px rgba(46,74,58,0.30); }
    50%      { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(184,92,60,0), 0 10px 22px rgba(46,74,58,0.36); }
  }
  .fab-pulse { animation: fabPulse 1.2s ease-in-out infinite; transform-origin: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="ai-chat.jsx"></script>
</body>
</html>
